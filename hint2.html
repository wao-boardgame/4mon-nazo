<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>WAOの4枚謎 最終問題ヒント</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 500px;
      margin: auto;
    }

    .hint-box {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      cursor: pointer;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 6px;
    }

    .hint {
      margin-top: 10px;
      padding: 12px;
      background: #fff8c6;
      border: 1px solid #ccc;
      border-radius: 6px;
      display: none;
      white-space: pre-wrap;
    }

.answer-grid {
  display: none;              /* 最初は非表示 */
  margin-top: 20px;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.answer-grid a img {
  width: 100%;
  border-radius: 8px;
  border: 1px solid #ccc;
}
.answer-button {
  background: #ff9800;   /* オレンジ */
  color: white;
}

.answer-button:hover {
  background: #e68900;   /* 少し濃いオレンジ（ホバー時） */
}

  </style>
</head>
<body>

  <h2>WAOの4枚謎 最終問題ヒント</h2>

  <div class="hint-box">
    <button onclick="toggleHint('hint1')">ヒント①</button>
    <div id="hint1" class="hint">他のパターンのクリア画像を入手する方法を考えましょう。
SNSを探すという手段が考えられますが、自力でクリア画像を入手する方法があります。</div>
  </div>

  <div class="hint-box">
    <button onclick="toggleHint('hint2')">ヒント②</button>
    <div id="hint2" class="hint">『WAOの4問謎』は、全4パターン制作されていますが、ポストカード・シールとも各100枚のみ印刷という記載があります。</div>
  </div>

  <div class="hint-box">
    <button onclick="toggleHint('hint3')">ヒント③</button>
    <div id="hint3" class="hint">中央の4つのマークがシールになっているのには理由がありそうです。</div>
  </div>

  <div class="hint-box">
    <button onclick="toggleHint('hint4')">ヒント④</button>
    <div id="hint4" class="hint">シールを回転させると、それぞれの謎の答えが変わります。
同じ正誤判定サイトに、新しい4つの答えを入力しましょう。</div>
  </div>

<div class="hint-box">
<a href="explanation_final.html">
  <button class="answer-button">解答・解説を見る</button>
</a>
  <div id="answerArea" class="answer-grid">

  </div>
</div>

  <script>
  function toggleHint(id) {
    const target = document.getElementById(id);

    // 今の表示状態を確認
    const isOpen = target.style.display === 'block';

    // トグル動作：開いていれば閉じる、閉じていれば開く
    target.style.display = isOpen ? 'none' : 'block';
  }

  function toggleAnswer() {
    const area = document.getElementById('answerArea');
    const isOpen = area.style.display === 'grid';
    area.style.display = isOpen ? 'none' : 'grid';
  }

  </script>

</body>
</html>
