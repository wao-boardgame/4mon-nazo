  <h2>WAOの4問謎 解説</h2>

  <p>
<strong> 左上の謎</strong><br>

「さ」と「う」に書かれた漢字を読むと、乗馬になります。<br>
♠の答え＝「め」と「ろ」に書かれた漢字を読むと、答えは<strong><span style="color:red;">女子</span></strong>です。<br>
<br>

<strong> 左下の謎</strong><br>

♦の答えを2つに分解し、その間の文字を読みます。<br>
「女子」を表すマークを分解し、「●」と「▲」の間を読むと、答えは<strong><span style="color:red;">たま</span></strong>です。<br>
<br>


<strong> 右上の謎</strong><br>
♥の答えを見つけて、2つのイラストを線で結びます。桂馬の間を読むと、答えは<strong><span style="color:red;">メトロ</span></strong>です。<br>
<br>


<strong> 右下の謎</strong><br>

「ね」の2乗＝8の2乗＝64を表に基づいてひらがなに変換すると「いえ」<br>
♣の答え「たま」の2乗＝31×31＝961で、答えは<strong><span style="color:red;">けいま</span></strong>です。<br>
<br>

</p>
